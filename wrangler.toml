name = "food-queue"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "foodqueue-db"
database_id = "e750e246-9cac-49b4-b4a5-a2678b3b9740"

# --- Optional R2 photo uploads ---------------------------------------------
# Uploads are OFF by default (recipes use a pasted image URL). To enable native
# photo uploads later: create the bucket (`wrangler r2 bucket create foodqueue-images`
# or the dashboard), UNCOMMENT the block below, then redeploy. No code changes needed.
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "foodqueue-images"

# Secrets / vars (set in Cloudflare dashboard or via `wrangler pages secret put`):
#   ANTHROPIC_API_KEY   - required for /api/generate
#   GENERATE_MODEL      - optional, defaults to claude-sonnet-4-6
#   GENERATE_SECRET     - optional, if set the generate endpoint requires header x-generate-secret
